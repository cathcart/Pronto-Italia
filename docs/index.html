<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#087d5b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Pronto Italia">
    <title>Pronto Italia</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
    <link rel="icon" href="./assets/icon-192.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <img src="./assets/icon-192.png" width="42" height="42" alt="">
          <div>
            <h1>Pronto Italia</h1>
            <p id="network-label"><span class="status-dot"></span> Ready offline</p>
          </div>
        </div>
        <button class="icon-command" id="install-open" type="button" aria-label="Install app" title="Install on iPhone">
          <span aria-hidden="true">+</span>
        </button>
      </header>

      <main id="screen" class="screen" aria-live="polite"></main>

      <nav class="tabbar" aria-label="Primary navigation">
        <button type="button" data-nav="today">Today</button>
        <button type="button" data-nav="phrases">Phrases</button>
        <button type="button" data-nav="review">Review</button>
        <button type="button" data-nav="practice">Practice</button>
        <button type="button" data-nav="listen">Listen</button>
      </nav>
    </div>

    <dialog id="install-dialog" class="sheet">
      <form method="dialog">
        <div class="sheet-head">
          <h2>Install on iPhone</h2>
          <button class="icon-command" value="cancel" aria-label="Close" title="Close">&times;</button>
        </div>
        <ol>
          <li>Open this page in Safari.</li>
          <li>Tap the Share button.</li>
          <li>Choose <strong>Add to Home Screen</strong>.</li>
        </ol>
        <p class="muted">After the first online visit, study screens and saved progress remain available offline. Podcast links need internet.</p>
        <button class="action secondary full" value="cancel">Done</button>
      </form>
    </dialog>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
